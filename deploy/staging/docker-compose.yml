services:
  api:
    build:
      context: ../../crm-backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: file:/data/db.sqlite
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./data:/data
      - ./uploads:/app/uploads
    expose:
      - "5000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    environment:
      STAGING_DOMAIN: ${STAGING_DOMAIN}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER}
      BASIC_AUTH_HASH: ${BASIC_AUTH_HASH}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./public/storefront:/srv/storefront:ro
      - ./public/crm:/srv/crm:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:

